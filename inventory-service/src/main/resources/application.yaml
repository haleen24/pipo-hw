spring:
  servers:
    - url : http://localhost:8080
      description: inventory-service
  jpa:
    hibernate:
      ddl-auto: validate
  application:
    name: inventory
  datasource:
    url: ${PG_URL}
    username: ${PG_USER}
    password: ${PG_PASSWORD}
    driver-class-name: org.postgresql.Driver
  liquibase:
    change-log: classpath:/db/changelog/changelog-master.yaml
