spring:
  jpa:
    hibernate:
      ddl-auto: validate
  application:
    name: user
  liquibase:
    change-log: classpath:/db/changelog/changelog-master.yaml

proxy:
  target-url: http://localhost:8080

jwt:
  expiration-time: 10m
  key:
    public: public-test.pem
    private: private-test.pem

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
  prometheus:
    metrics:
      export:
        enabled: true
