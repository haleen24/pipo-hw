springdoc:
  swagger-ui:
    urls:
      - name: User Service
        url: /v3/api-docs
      - name: Inventory Service
        url: /openapi/inventory-service.yaml
  servers:
    - url: ${SERVER_URL}
      description: Kubernetes
management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      probes:
        enabled: true
  security:
    enabled: false
server:
  port: 8081
  servers:
    - url : ${SERVER_URL}
spring:
  jpa:
    hibernate:
      ddl-auto: validate
  application:
    name: user
  datasource:
    url: ${PG_URL}
    username: ${PG_USER}
    password: ${PG_PASSWORD}
    driver-class-name: org.postgresql.Driver
  liquibase:
    change-log: classpath:/db/changelog/changelog-master.yaml

proxy:
  target-url: ${INVENTORY_URL}

jwt:
  expiration-time: 10m
  key:
    public: ${JWT_PUBLIC_KEY}
    private: ${JWT_PRIVATE_KEY}