server:
  port: 8081
spring:
  jpa:
    hibernate:
      ddl-auto: validate
  application:
    name: user
  datasource:
    url: ${PG_URL}
    username: ${PG_USER}
    password: ${PG_PASSWORD}
    driver-class-name: org.postgresql.Driver
  liquibase:
    change-log: classpath:/db/changelog/changelog-master.yaml

proxy:
  target-url: http://localhost:8080

jwt:
  expiration-time: 10m
  key:
    public: ${JWT_PUBLIC_KEY}
    private: ${JWT_PRIVATE_KEY}