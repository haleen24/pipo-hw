name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  inventory-service:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./inventory-service

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Build and Test
        run: ./gradlew build

  user-service:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./user-service

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Build and Test
        run: ./gradlew build