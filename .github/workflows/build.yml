name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  inventory-service:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'
      - name: Make gradlew executable
        run: chmod +x gradlew
      - name: Build and Test inventory-service
        run: ./gradlew :inventory-service:build

  user-service:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'
      - name: Make gradlew executable
        run: chmod +x gradlew
      - name: Build and Test user-service
        run: ./gradlew :user-service:build